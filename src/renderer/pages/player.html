<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vexona Screen Recorder — Playback</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      color: #f1f5f9;
      user-select: none;
    }

    .titlebar {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 12px;
      background: rgba(19, 19, 26, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      -webkit-app-region: drag;
    }

    .titlebar-text {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .titlebar-btn {
      width: 32px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      border-radius: 4px;
      -webkit-app-region: no-drag;
      transition: all 0.15s;
    }
    .titlebar-btn:hover { background: rgba(255,255,255,0.1); color: #f1f5f9; }
    .titlebar-btn.close:hover { background: #ef4444; color: white; }
    .titlebar-btn svg { width: 14px; height: 14px; }

    .player-container {
      height: calc(100% - 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      outline: none;
    }

    .toolbar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .player-container:hover .toolbar { opacity: 1; }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #94a3b8;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.12); color: #f1f5f9; }
    .tool-btn svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-text" id="title">Vexona Screen Recorder — Playback</span>
    <button class="titlebar-btn close" id="btn-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="player-container">
    <video id="video" controls autoplay></video>
    <div class="toolbar">
      <button class="tool-btn" id="btn-folder" title="Show in folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Show in Folder
      </button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');

    // Receive file path from main process
    if (window.snapforge) {
      window.snapforge.onPlayFile((filePath) => {
        // Convert Windows path to file:// URL
        const fileUrl = 'file:///' + filePath.replace(/\\/g, '/');
        video.src = fileUrl;
        document.getElementById('title').textContent = `Vexona Screen Recorder — ${filePath.split(/[\\/]/).pop()}`;
      });

      document.getElementById('btn-close').addEventListener('click', () => {
        window.close();
      });

      document.getElementById('btn-folder').addEventListener('click', () => {
        window.snapforge.showInFolder();
      });
    }
  </script>
</body>
</html>
