<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Region Overlay</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    .region-border {
      position: absolute;
      /* Offset by the padding added in main.js (top: 30px for label, sides: 4px for border) */
      top: 30px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border: 2px solid rgba(5, 150, 105, 0.7);
      border-radius: 2px;
      /* Animated marching ants via background */
      background-image:
        repeating-linear-gradient(0deg, rgba(5,150,105,0.6) 0px, rgba(5,150,105,0.6) 6px, transparent 6px, transparent 12px),
        repeating-linear-gradient(90deg, rgba(5,150,105,0.6) 0px, rgba(5,150,105,0.6) 6px, transparent 6px, transparent 12px),
        repeating-linear-gradient(180deg, rgba(5,150,105,0.6) 0px, rgba(5,150,105,0.6) 6px, transparent 6px, transparent 12px),
        repeating-linear-gradient(270deg, rgba(5,150,105,0.6) 0px, rgba(5,150,105,0.6) 6px, transparent 6px, transparent 12px);
      background-size: 2px 100%, 100% 2px, 2px 100%, 100% 2px;
      background-position: 0 0, 0 0, 100% 0, 0 100%;
      background-repeat: no-repeat;
      animation: marchBorder 0.8s linear infinite;
    }

    @keyframes marchBorder {
      to {
        background-position: 0 12px, -12px 0, 100% -12px, 12px 100%;
      }
    }

    /* Subtle outer glow */
    .region-border::before {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(5, 150, 105, 0.15);
      border-radius: 4px;
    }

    /* Corner markers */
    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #34d399;
      border-style: solid;
      border-width: 0;
    }

    .corner-tl { top: -2px; left: -2px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 3px; }
    .corner-tr { top: -2px; right: -2px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 3px; }
    .corner-bl { bottom: -2px; left: -2px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 3px; }
    .corner-br { bottom: -2px; right: -2px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 3px; }

    /* Label showing region size + REC dot */
    .region-label {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 15, 0.88);
      backdrop-filter: blur(8px);
      color: #e2e8f0;
      padding: 3px 12px;
      border-radius: 6px;
      border: 1px solid rgba(5, 150, 105, 0.3);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
      animation: recPulse 1.2s ease-in-out infinite;
    }

    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="region-border">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="region-label" id="region-label">
      <div class="rec-dot"></div>
      <span id="label-text">Recording Region</span>
    </div>
  </div>

  <script>
    if (window.snapforge) {
      window.snapforge.onRegionInfo((info) => {
        const labelText = document.getElementById('label-text');
        if (labelText && info) {
          labelText.textContent = `REC ${info.width} × ${info.height}`;
        }
      });
    }
  </script>
</body>
</html>
