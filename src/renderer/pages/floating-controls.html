<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recording Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      user-select: none;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.03);
      -webkit-app-region: drag;
    }

    /* Recording dot */
    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .rec-dot.paused {
      background: #f59e0b;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.6);
      animation: none;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Timer */
    .timer {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      font-variant-numeric: tabular-nums;
      min-width: 52px;
      text-align: center;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* Buttons */
    .ctrl-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: #94a3b8;
      -webkit-app-region: no-drag;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #f1f5f9;
    }

    .ctrl-btn svg {
      width: 16px;
      height: 16px;
    }

    .ctrl-btn.btn-stop {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .ctrl-btn.btn-stop:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .ctrl-btn.btn-pause:hover {
      color: #f59e0b;
    }

    .status-label {
      font-size: 10px;
      font-weight: 600;
      color: #ef4444;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-label.paused {
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="controls">
    <div class="rec-dot" id="rec-dot"></div>
    <span class="status-label" id="status-label">REC</span>
    <span class="timer" id="timer">00:00</span>
    <div class="divider"></div>
    <button class="ctrl-btn btn-pause" id="btn-pause" title="Pause">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
    </button>
    <button class="ctrl-btn btn-stop" id="btn-stop" title="Stop Recording">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
  </div>

  <script>
    const timer = document.getElementById('timer');
    const recDot = document.getElementById('rec-dot');
    const statusLabel = document.getElementById('status-label');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');

    let isPaused = false;

    // Listen for timer updates from main process
    window.snapforge.onTimerUpdate((time) => {
      timer.textContent = time;
    });

    window.snapforge.onPauseStateChange((paused) => {
      isPaused = paused;
      recDot.className = paused ? 'rec-dot paused' : 'rec-dot';
      statusLabel.className = paused ? 'status-label paused' : 'status-label';
      statusLabel.textContent = paused ? 'PAUSED' : 'REC';

      // Swap pause/resume icon
      btnPause.innerHTML = paused
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
      btnPause.title = paused ? 'Resume' : 'Pause';
    });

    btnPause.addEventListener('click', () => {
      window.snapforge.floatingAction('pause');
    });

    btnStop.addEventListener('click', () => {
      window.snapforge.floatingAction('stop');
    });
  </script>
</body>
</html>
