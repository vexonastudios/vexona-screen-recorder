<!-- Vexona Screen Recorder App Icon SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.25"/>
  <!-- Main camera body outline -->
  <rect x="44" y="76" width="168" height="120" rx="18" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.7"/>
  <!-- Viewfinder bump top -->
  <rect x="92" y="60" width="50" height="20" rx="8" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.7"/>
  <!-- Lens outer ring -->
  <circle cx="128" cy="136" r="42" fill="none" stroke="url(#ring)" stroke-width="3.5" opacity="0.9" filter="url(#glow)"/>
  <!-- Lens mid ring -->
  <circle cx="128" cy="136" r="30" fill="none" stroke="url(#lens)" stroke-width="2" opacity="0.5"/>
  <!-- Lens fill -->
  <circle cx="128" cy="136" r="24" fill="url(#lens)" opacity="0.18"/>
  <!-- Lens inner bright dot -->
  <circle cx="128" cy="136" r="10" fill="url(#ring)" opacity="0.9" filter="url(#innerglow)"/>
  <!-- Highlight reflection -->
  <circle cx="117" cy="123" r="5" fill="white" opacity="0.35"/>
  <!-- Record indicator dot (top-right corner of body) -->
  <circle cx="193" cy="96" r="9" fill="#ef4444" opacity="0.9"/>
  <circle cx="193" cy="96" r="5" fill="#fca5a5" opacity="0.8"/>
</svg>
